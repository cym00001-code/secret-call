server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/8.138.150.200/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/8.138.150.200/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    access_log /www/wwwlogs/secret-room.ssl.access.log;
    error_log /www/wwwlogs/secret-room.ssl.error.log;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /ws {
        proxy_cache off;
        proxy_pass http://127.0.0.1:3101/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    location = /download {
        alias /www/wwwroot/secret-room-downloads/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /download/ {
        alias /www/wwwroot/secret-room-downloads/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /api/ {
        proxy_cache off;
        proxy_pass http://127.0.0.1:3101/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
